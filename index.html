<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="埕花 - 鹽夏不夜埕花語抽籤互動體驗" />
    <title>埕花 | 花語解籤</title>
    <style>
      /* 載入畫面樣式 */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #0f0a1e, #1a1033, #251540);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-flower-icon {
        font-size: 3.5rem;
        animation: float 2.8s ease-in-out infinite;
        filter: drop-shadow(0 0 16px rgba(192, 132, 252, 0.65));
        user-select: none;
      }

      .loading-title {
        margin-top: 1rem;
        color: rgba(255, 255, 255, 0.92);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 1.75rem;
        font-weight: 300;
        letter-spacing: 6px;
      }

      .loading-subtitle {
        margin-top: 0.3rem;
        color: rgba(192, 132, 252, 0.75);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.78rem;
        letter-spacing: 3px;
      }

      .loading-bar-track {
        margin-top: 2rem;
        width: 160px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a855f7, #ec4899);
        border-radius: 2px;
        transition: width 0.25s ease;
        box-shadow: 0 0 6px rgba(168, 85, 247, 0.6);
      }

      .loading-percent {
        margin-top: 0.6rem;
        color: rgba(255, 255, 255, 0.3);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.7rem;
        letter-spacing: 1px;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-6deg); }
        50% { transform: translateY(-10px) rotate(6deg); }
      }
    </style>
  </head>
  <body>
    <!-- 載入畫面 -->
    <div id="loading-screen">
      <div class="loading-flower-icon">🌸</div>
      <p class="loading-title">埕花</p>
      <p class="loading-subtitle">花語解籤</p>
      <div class="loading-bar-track">
        <div id="loading-bar" class="loading-bar-fill"></div>
      </div>
      <p id="loading-percent" class="loading-percent">0%</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
