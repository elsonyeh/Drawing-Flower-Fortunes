    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="埕花 - 鹽夏不夜埕花語抽籤互動體驗" />
    <!-- iOS Safari 狀態列與網頁背景色同步 -->
    <!-- theme-color 對應頁面底部漸層色 (night-700)，讓 Safari 工具列顏色與底部融合 -->
    <meta name="theme-color" content="#2a1f3e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#2a1f3e" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>埕花 | 花語解籤</title>
    <style>
      /* 載入畫面樣式 */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, #0a0118, #1a0f2e, #2a1f3e);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-flower-icon {
        font-size: 3.5rem;
        animation: float 2.8s ease-in-out infinite;
        filter: drop-shadow(0 0 16px rgba(192, 132, 252, 0.65));
        user-select: none;
      }

      .loading-title {
        margin-top: 1rem;
        color: rgba(255, 255, 255, 0.92);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 1.75rem;
        font-weight: 300;
        letter-spacing: 6px;
      }

      .loading-subtitle {
        margin-top: 0.3rem;
        color: rgba(192, 132, 252, 0.75);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.78rem;
        letter-spacing: 3px;
      }

      .loading-bar-track {
        margin-top: 2rem;
        width: 160px;
        height: 3px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      .loading-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a855f7, #ec4899);
        border-radius: 2px;
        transition: width 0.25s ease;
        box-shadow: 0 0 6px rgba(168, 85, 247, 0.6);
      }

      .loading-percent {
        margin-top: 0.6rem;
        color: rgba(255, 255, 255, 0.3);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 0.7rem;
        letter-spacing: 1px;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(-6deg); }
        50% { transform: translateY(-10px) rotate(6deg); }
      }
    </style>
  </head>
